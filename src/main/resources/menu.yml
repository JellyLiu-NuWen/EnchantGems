      name: "&a&l强化说明"
      lore:
        - "&7左侧放武器，右侧放宝石"
        - "&7点击下方铁砧确认强化"

  "C":
    display:
      material: "AMETHYST_SHARD"
      name: "&d&l宝石槽"
      lore:
        - "&7将强化宝石"
        - "&7放入正下方的槽位中"

  "Tool":
    feature: "tool-slot"

  "Gem":
    feature: "gem-slot"

  "Confirm":
    feature: "confirm"
    display:
      material: "ANVIL"
      name: "&a&l确认强化"
