Title:
  - "&8武器强化台"

Layout:
  - "##A#B#C##"
  - "##`Tool`#`Confirm`#`Gem`##"
  - "##D#E#F##"

Icons:
  "#":
    display:
      material: "BLACK_STAINED_GLASS_PANE"
      name: " "

  "A":
    display:
      material: "DIAMOND_SWORD"
      name: "&b&l武器槽"
      lore:
        - "&7将需要强化的武器或工具"
        - "&7放入正下方的槽位中"

  "B":
